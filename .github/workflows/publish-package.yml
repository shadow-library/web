name: Publish package to NPM

on:
  workflow_dispatch:
    inputs:
      release:
        type: choice
        description: 'Release type — stable level (major/minor/patch) or prerelease channel (alpha/beta)'
        default: 'patch'
        options:
          - 'major'
          - 'minor'
          - 'patch'
          - 'alpha'
          - 'beta'
      force:
        type: boolean
        description: 'Release the chosen level even if the commits require a higher bump'
        default: false

jobs:
  publish:
    if: github.actor == 'leanderpaul' && github.triggering_actor == 'leanderpaul' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.SHADOW_MANAGER_APP_ID }}
          private-key: ${{ secrets.SHADOW_MANAGER_PRIVATE_KEY }}

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # npm publish authenticates via OIDC trusted publishing (id-token: write) — no NODE_AUTH_TOKEN needed.
      - name: Release
        run: bunx shadow release ${{ inputs.release }} ${{ inputs.force && '--force' || '' }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
